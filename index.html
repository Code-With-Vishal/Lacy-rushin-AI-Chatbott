<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ivy | AI Assistant for Lacy Rushin</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f3f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;gap:8px}
  .agent-tag{text-align:center;font-size:12px;color:#999}
  .agent-tag strong{color:#555}
  .panel{background:#fff;border:1px solid #e5e3de;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;height:580px;box-shadow:0 2px 24px rgba(0,0,0,0.07)}
  .hdr{padding:14px 18px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;gap:11px}
  .av{width:36px;height:36px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2563eb;flex-shrink:0}
  .bname{font-size:14px;font-weight:700;color:#111}
  .bstatus{font-size:11px;color:#999;display:flex;align-items:center;gap:4px;margin-top:1px}
  .dot{width:6px;height:6px;border-radius:50%;background:#16a34a;display:inline-block}
  .pill{margin-left:auto;font-size:11px;padding:3px 9px;border-radius:20px;background:#f4f3f0;color:#777;border:1px solid #e5e3de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .msg{display:flex;gap:8px;align-items:flex-end;max-width:85%}
  .msg.user{flex-direction:row-reverse;align-self:flex-end}
  .bbl{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;color:#222;background:#f4f3f0;border:1px solid #eae8e3}
  .msg.user .bbl{background:#2563eb;color:#fff;border-color:#2563eb;border-bottom-right-radius:4px}
  .msg.bot .bbl{border-bottom-left-radius:4px}
  .mav{width:26px;height:26px;border-radius:50%;background:#eff6ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#2563eb}
  .td{display:flex;gap:4px;padding:10px 14px;background:#f4f3f0;border:1px solid #eae8e3;border-radius:16px;border-bottom-left-radius:4px}
  .td span{width:6px;height:6px;border-radius:50%;background:#bbb;animation:bl 1.2s infinite}
  .td span:nth-child(2){animation-delay:.2s}
  .td span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .eb{font-size:12px;color:#dc2626;padding:4px 16px 6px;text-align:center}
  .ir{padding:10px 12px;border-top:1px solid #f0ede8;display:flex;gap:8px;align-items:center;background:#fff}
  .ir input{flex:1;font-size:13px;padding:9px 14px;border:1px solid #ddd;border-radius:22px;color:#111;background:#fafaf8}
  .ir input:focus{outline:none;border-color:#2563eb;background:#fff}
  .sb{width:36px;height:36px;border-radius:50%;background:#2563eb;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sb:hover{background:#1d4ed8}
  .sb:disabled{background:#ddd;cursor:not-allowed}
  .sb svg{width:14px;height:14px;fill:#fff}
  .pw{text-align:center;font-size:11px;color:#ccc;padding-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="agent-tag">AI Assistant for <strong>Lacy Rushin</strong></div>
  <div class="panel">
    <div class="hdr">
      <div class="av">Ivy</div>
      <div>
        <div class="bname">Ivy</div>
        <div class="bstatus"><span class="dot"></span>Online now</div>
      </div>
      <div class="pill">www.lacyrushin.com/</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div id="eb"></div>
    <div class="ir">
      <input type="text" id="inp" placeholder="Ask about listings, pricing, viewings..." onkeydown="if(event.key==='Enter')send()"/>
      <button class="sb" id="sb" onclick="send()"><svg viewBox="0 0 16 16"><path d="M2 8l12-6-4 12-3-4-5-2z"/></svg></button>
    </div>
  </div>
  <div class="pw">Powered by Ivy AI</div>
</div>
<script>
const KEY="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",AGENT="Lacy Rushin",SITE="www.lacyrushin.com/";
let H=[],busy=false;
function ab(h){const m=document.getElementById('msgs'),d=document.createElement('div');d.className='msg bot';d.innerHTML='<div class="mav">Ivy</div><div class="bbl">'+h+'</div>';m.appendChild(d);m.scrollTop=m.scrollHeight}
function au(t){const m=document.getElementById('msgs'),d=document.createElement('div');d.className='msg user';d.innerHTML='<div class="bbl">'+t+'</div>';m.appendChild(d);m.scrollTop=m.scrollHeight}
function st(){const m=document.getElementById('msgs'),d=document.createElement('div');d.className='msg bot';d.id='ty';d.innerHTML='<div class="mav">Ivy</div><div class="td"><span></span><span></span><span></span></div>';m.appendChild(d);m.scrollTop=m.scrollHeight}
function rt(){const t=document.getElementById('ty');if(t)t.remove()}
function se(m){document.getElementById('eb').innerHTML='<div class="eb">'+m+'</div>'}
function ce(){document.getElementById('eb').innerHTML=''}
async function send(){
  if(busy)return;
  const inp=document.getElementById('inp'),text=inp.value.trim();
  if(!text)return;
  ce();inp.value='';busy=true;document.getElementById('sb').disabled=true;
  au(text);H.push({role:'user',content:text});st();
  const sys='You are Ivy, a friendly AI real estate assistant for '+AGENT+' at '+SITE+'. Help visitors with property questions, qualify leads by asking about budget, timeline, property type, and location. Offer to book a call or viewing when they seem ready. Keep replies conversational, 2 to 4 sentences. Never use em dashes. Do not mention Claude or Anthropic. You are Ivy.';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:sys,messages:H})});
    const data=await r.json();rt();
    if(data.content&&data.content[0]&&data.content[0].text){const rep=data.content[0].text;H.push({role:'assistant',content:rep});ab(rep.replace(/\n/g,'<br>'))}
    else{se(data.error?data.error.message:'Something went wrong. Please try again.')}
  }catch(e){rt();se('Preview mode — API key removed for safety.')}
  busy=false;document.getElementById('sb').disabled=false;document.getElementById('inp').focus();
}
ab("Hi! I'm Ivy, the AI assistant for "+AGENT+". Thinking about buying, selling, or investing? What can I help you with today?");
</script>
</body>
</html>
